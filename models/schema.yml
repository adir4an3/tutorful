version: 2

models:

  # ── STAGING ──────────────────────────────────────────────────────────────

  - name: lesson_bookings
    description: >
      Cleans the raw lesson_bookings source. Renames columns to snake_case,
      parses the MM/DD/YY HH:MM string timestamps into proper TIMESTAMP types
      using parse_timestamp, and normalises lesson_status to lowercase.
      All statuses are retained here — filtering to completed only happens
      in bookings_student.
    columns:
      - name: booking_id
        description: Primary key. Renamed from LessonsB ID.
        tests: [unique, not_null]
      - name: lesson_id
        description: Foreign key to lessons.
        tests: [not_null]
      - name: start_time
        description: Lesson start as a parsed TIMESTAMP.
        tests: [not_null]
      - name: finish_time
        description: Lesson finish as a parsed TIMESTAMP.
        tests: [not_null]
      - name: lesson_status
        description: Lowercased booking outcome. Either 'completed' or 'cancelled'.
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'cancelled']

  - name: lessons
    description: >
      Cleans the raw lessons source. Renames columns to snake_case.
      Retains subject_id for completeness though it is not used in
      churn analysis (see sources.yml for rationale).
    columns:
      - name: lesson_id
        description: Primary key. Renamed from id.
        tests: [unique, not_null]
      - name: relationship_id
        description: Foreign key to relationships.
        tests: [not_null]

  - name: relationships
    description: >
      Cleans the raw relationships source. Maps relationship_id to
      tutor_id and student_id. student_id is the grain used for all
      churn calculations downstream.
    columns:
      - name: relationship_id
        description: Primary key. Renamed from ID.
        tests: [unique, not_null]
      - name: tutor_id
        description: Tutor identifier. Renamed from Tutor.
        tests: [not_null]
      - name: student_id
        description: Student identifier. Renamed from Student. Churn grain.
        tests: [not_null]

  - name: bookings_student
    description: >
      Joins lesson_bookings, lessons, and relationships into a single flat
      model of completed lessons with student context. Only completed bookings
      are retained — cancelled lessons do not reset the 30-day churn clock
      and are excluded here so no downstream model can accidentally include them.
      finish_date is used as the lesson date for gap calculations, as a lesson
      is counted as completed on the date it finished.
    columns:
      - name: booking_id
        description: Primary key for a completed booking.
        tests: [unique, not_null]
      - name: student_id
        description: The student who completed the lesson.
        tests: [not_null]
      - name: lesson_id
        description: The lesson that was completed.
        tests: [not_null]
      - name: finish_date
        description: >
          Calendar date derived from finish_time. Used as the lesson date
          in gap calculations.
        tests: [not_null]
      - name: lesson_status
        description: Always 'completed' in this model.
        tests:
          - accepted_values:
              values: ['completed']

  - name: dates
    description: >
      Raw date dimension generated by the dbt_date package covering
      2024-12-01 to 2026-05-31. Used as the input to dim_date.

  - name: dim_date
    description: >
      Enriched date dimension combining the dbt_date date spine with
      fiscal period attributes (fiscal week, period, quarter).
      Used as the date spine in daily_churns_reactivation to ensure
      zero-event days appear in output rather than being absent.
    columns:
      - name: date_day
        description: Primary key. One row per calendar date.
        tests: [unique, not_null]

  # ── SILVER (INTERMEDIATE) ────────────────────────────────────────────────

  - name: student_lesson_gaps
    description: >
      Identifies every churn and reactivation event per student across
      the full history of completed lessons. One row per gap > 30 days
      between consecutive completed lesson dates per student.

      Logic:
      1. Deduplicate bookings_student to one row per student per finish_date
         so multiple bookings on the same day do not create false short gaps.
      2. LAG() over finish_date per student to find the previous lesson date.
      3. Where the gap exceeds 30 days: churn_date = previous_lesson_date + 30
         and reactivation_date = the finish_date of the next completed lesson.

      A student who churns and reactivates multiple times produces multiple
      rows — one per gap event. This is consistent with the business definition.
    columns:
      - name: student_id
        description: The student who experienced the gap.
        tests: [not_null]
      - name: churn_date
        description: previous_lesson_date + 30 days. The date the student became churned.
        tests: [not_null]
      - name: reactivation_date
        description: The finish_date of the lesson that ended the gap.
        tests: [not_null]
      - name: previous_lesson_date
        description: The finish_date of the last lesson before the gap.
        tests: [not_null]
      - name: days_since_previous_lesson
        description: Gap in days between consecutive lessons. Always > 30.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 30"

  # ── MART ─────────────────────────────────────────────────────────────────

  - name: student_churn_reactivation
    description: >
      Event-level mart. One row per churn/reactivation pair per student
      across all time. The business question asks for February 2026 but
      the logic is generic — February is applied as a filter at query time.
      Extended metrics included beyond the core ask:
      - days_until_reactivation: recovery lag between churn and reactivation
      - churn_event_number: sequential rank of churn events per student
      - is_repeat_churner: flag for students who have churned more than once
      - total_churn_events: lifetime churn count per student
    columns:
      - name: student_id
        description: Student identifier.
        tests: [not_null]
      - name: churn_date
        description: Date the student churned (previous lesson + 30 days).
        tests: [not_null]
      - name: reactivation_date
        description: Date the student reactivated.
        tests: [not_null]
      - name: gap_days
        description: Total gap in days between the surrounding lessons.
        tests: [not_null]
      - name: churn_event_number
        description: Chronological rank of this churn event for the student.
        tests: [not_null]
      - name: is_repeat_churner
        description: True if the student has churned more than once.
        tests:
          - accepted_values:
              values: [true, false]

  - name: daily_churns_reactivation
    description: >
      Daily aggregated churn and reactivation counts across all time.
      One row per calendar date. Uses dim_date as the date spine so dates
      with zero events appear as 0 — important for accurate trend analysis.
      Filter on event_date for any specific reporting window.
    columns:
      - name: event_date
        description: Calendar date. Primary key.
        tests: [unique, not_null]
      - name: churn_count
        description: Students who reached churn status on this date.
        tests: [not_null]
      - name: reactivation_count
        description: Students who reactivated on this date.
        tests: [not_null]
      - name: total_events
        description: Sum of churn and reactivation events.
        tests: [not_null]
      - name: day_of_week
        description: Full day name e.g. Monday. Useful for weekend pattern analysis.
